<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Redaction Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 48px;
            text-align: center;
            max-width: 520px;
            width: 100%;
        }
        .upload-card h1 {
            font-size: 24px;
            color: #58a6ff;
            margin-bottom: 8px;
        }
        .upload-card p {
            color: #8b949e;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .drop-zone {
            border: 2px dashed #30363d;
            border-radius: 8px;
            padding: 48px 24px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 24px;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.05);
        }
        .drop-zone svg {
            width: 48px;
            height: 48px;
            fill: #484f58;
            margin-bottom: 12px;
        }
        .drop-zone .label {
            font-size: 14px;
            color: #8b949e;
        }
        .drop-zone .filename {
            font-size: 16px;
            color: #58a6ff;
            font-weight: 600;
            margin-top: 8px;
            display: none;
        }
        input[type="file"] { display: none; }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #238636;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            opacity: 0.4;
            pointer-events: none;
        }
        .btn.active {
            opacity: 1;
            pointer-events: auto;
        }
        .btn.active:hover {
            background: #2ea043;
        }
    </style>
</head>
<body>
    <form class="upload-card" action="/upload" method="POST" enctype="multipart/form-data">
        <h1>PDF Redaction Tool</h1>
        <p>Upload an engineering PDF to scan, review, and redact sensitive information.</p>

        <div class="drop-zone" id="dropZone">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11zM8 15h8v2H8v-2z"/></svg>
            <div class="label">Drop a PDF here or click to browse</div>
            <div class="filename" id="fileName"></div>
        </div>
        <input type="file" name="pdf" id="fileInput" accept=".pdf">

        <button type="submit" class="btn" id="submitBtn">Scan &amp; Redact</button>
    </form>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const submitBtn = document.getElementById('submitBtn');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) showFile(fileInput.files[0]);
        });

        function showFile(file) {
            fileName.textContent = file.name;
            fileName.style.display = 'block';
            submitBtn.classList.add('active');
        }
    </script>
</body>
</html>
